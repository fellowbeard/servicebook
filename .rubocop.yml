require:
  - rubocop-rails
  - rubocop-performance

AllCops:
  TargetRubyVersion: 3.4
  TargetRailsVersion: 8.1
  SuggestExtensions: false
  Exclude:
    - 'bin/**/*'
    - 'db/schema.rb'
    - 'node_modules/**/*'
    - 'vendor/**/*'
    - '.git/**/*'

# Code style and formatting
Layout/LineLength:
  Max: 120
  Exclude:
    - 'db/migrate/**/*'

Layout/IndentationWidth:
  Width: 2

Style/StringLiterals:
  EnforcedStyle: single_quotes
  Exclude:
    - 'config/**/*'
    - 'db/migrate/**/*'

Style/SymbolArray:
  EnforcedStyle: brackets

Style/WordArray:
  EnforcedStyle: brackets

Style/TrailingCommaInArrayLiteral:
  EnforcedStyleForMultiline: comma

Style/TrailingCommaInHashLiteral:
  EnforcedStyleForMultiline: comma

# Naming conventions
Naming/MethodName:
  EnforcedStyle: snake_case

Naming/VariableName:
  EnforcedStyle: snake_case

Naming/ClassAndModuleCamelCase:
  Enabled: true

Naming/FileName:
  Enabled: true

# Best practices
Style/FrozenStringLiteralComment:
  Enabled: false

Style/Documentation:
  Enabled: false

Style/ClassAndModuleChildren:
  EnforcedStyle: compact

Style/Lambda:
  EnforcedStyle: lambda

Style/SafeNavigation:
  Enabled: true

Lint/UnusedMethodArgument:
  AllowUnusedKeywordArguments: false
  IgnoreEmptyMethods: true

Lint/UnusedBlockArgument:
  IgnoreEmptyBlocks: true

Metrics/MethodLength:
  Max: 20
  Exclude:
    - 'db/migrate/**/*'

Metrics/ClassLength:
  Max: 150
  Exclude:
    - 'db/migrate/**/*'

Metrics/BlockLength:
  Max: 25
  Exclude:
    - 'spec/**/*'
    - 'db/migrate/**/*'

Metrics/AbcSize:
  Max: 20
  Exclude:
    - 'db/migrate/**/*'

Metrics/CyclomaticComplexity:
  Max: 10

Metrics/ParameterLists:
  Max: 5

# Performance
Performance/FlatMap:
  Enabled: true

Performance/RedundantMerge:
  Enabled: true

Performance/StartWith:
  Enabled: true

Performance/EndWith:
  Enabled: true

Performance/RegexpMatch:
  Enabled: true

Performance/UnfreezeString:
  Enabled: true

Performance/DeletePrefix:
  Enabled: true

Performance/DeleteSuffix:
  Enabled: true

Performance/StringIdentifierArgument:
  Enabled: true

# Rails specific
Rails/FindById:
  Enabled: true

Rails/FindEach:
  Enabled: true

Rails/HasManyOrHasOneDependent:
  Enabled: true

Rails/Exit:
  Enabled: true

Rails/Output:
  Enabled: true

Rails/Pluck:
  Enabled: true

Rails/PluckInWhere:
  Enabled: true

Rails/Presence:
  Enabled: true

Rails/Present:
  Enabled: true

Rails/WhereNot:
  Enabled: true
